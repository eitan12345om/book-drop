<!doctype html>
<html lang="en" class="EREADER_CLASS_PLACEHOLDER">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookDrop | Send ebooks to your Kobo, Kindle, or Tolino</title>

    <!-- No indexing — this is a per-device session page -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#1c1917" />

    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script src="theme.js"></script>
    <script nonce="NONCE_PLACEHOLDER">
      if (/Kobo|Kindle|Tolino/i.test(navigator.userAgent)) {
        document.documentElement.classList.add('ereader');
      }
    </script>
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="download.css" />
  </head>
  <body>
    <main class="wrapper">
      <header class="header">
        <div>
          <h1>BookDrop</h1>
          <p>Your unique key</p>
        </div>
        <button
          id="theme-toggle"
          class="btn-theme"
          aria-label="Switch to dark mode"
          title="Switch to dark mode"
        >
          <svg
            class="icon-moon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.7-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162Z"
              clip-rule="evenodd"
            />
          </svg>
          <svg
            class="icon-sun"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75ZM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59ZM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75ZM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591ZM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18ZM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59ZM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12ZM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591Z"
            />
          </svg>
        </button>
      </header>

      <div class="card" id="key-card">
        <div class="key-wrap">
          <span class="key-value" id="key-display" aria-label="Generating key" aria-live="polite"
            >––––</span
          >
          <button
            class="btn-icon"
            id="refresh-btn"
            aria-label="Generate new key"
            title="Generate new key"
            disabled
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M19.146 4.854l-1.489 1.489A8 8 0 1 0 12 20a8.094 8.094 0 0 0 7.371-4.886 1 1 0 1 0-1.842-.779A6.071 6.071 0 0 1 12 18a6 6 0 1 1 4.243-10.243l-1.39 1.39a.5.5 0 0 0 .354.854H19.5A.5.5 0 0 0 20 9.5V5.207a.5.5 0 0 0-.854-.353z"
              />
            </svg>
          </button>
        </div>
        <div class="status-row" id="status-row" role="status" aria-live="polite">
          <span class="dot" id="status-dot" aria-hidden="true"></span>
          <span id="status-label">Generating key…</span>
        </div>
      </div>

      <div class="card hidden" id="download-card">
        <h2 class="card-title" id="download-card-title">Download</h2>
        <div class="download-list" id="download-list"></div>
      </div>

      <p class="error-msg hidden" id="error-msg" role="alert"></p>

      <footer class="footer">
        <span>Send ebooks from: <a id="page-url" href=""></a></span>
        <span
          ><a
            href="https://github.com/eitan12345om/book-drop"
            target="_blank"
            rel="noopener noreferrer"
            >Source</a
          >
          ·
          <a
            href="https://github.com/daniel-j/send2ereader"
            target="_blank"
            rel="noopener noreferrer"
            >Forked from send2ereader by djazz</a
          ></span
        >
      </footer>
    </main>

    <script src="download.js" nonce="NONCE_PLACEHOLDER" defer></script>
    <script nonce="NONCE_PLACEHOLDER">
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    </script>
  </body>
</html>
